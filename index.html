<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Layoff Tracker</title>
  
  <!-- Load React and Tailwind -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // --- ICONS (SVG Format for zero-install setup) ---
    const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline></svg>;
    const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
    const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
    const IconExternalLink = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
    const IconRefresh = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;

    function App() {
      const [data, setData] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [isRefreshing, setIsRefreshing] = useState(false);

      // Fetch data from the local JSON file
      const loadData = async () => {
        setIsRefreshing(true);
        try {
          const res = await fetch(`/layoffs.json?t=${Date.now()}`);
          if (res.ok) {
            const jsonData = await res.json();
            setData(jsonData);
          }
        } catch (err) {
          console.error("Failed to load data", err);
        }
        setTimeout(() => setIsRefreshing(false), 500);
      };

      useEffect(() => {
        loadData();
      }, []);

      const stats = useMemo(() => {
        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        let monthTotal = 0; let yearTotal = 0;

        data.forEach(item => {
          const itemDate = new Date(item.date);
          const num = item.number || 0;
          if (itemDate.getFullYear() === currentYear) {
            yearTotal += num;
            if (itemDate.getMonth() === currentMonth) {
              monthTotal += num;
            }
          }
        });
        return { monthTotal, yearTotal };
      }, [data]);

      const filteredData = useMemo(() => {
        return data
          .filter(item => 
            item.company.toLowerCase().includes(searchTerm.toLowerCase()) ||
            item.roles.toLowerCase().includes(searchTerm.toLowerCase())
          )
          .sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [data, searchTerm]);

      return (
        <div className="min-h-screen selection:bg-blue-100">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-red-100 p-2.5 rounded-xl text-red-600">
                  <IconTrendingDown />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-900 tracking-tight">Tech Layoff Tracker</h1>
                  <div className="flex items-center gap-1.5 mt-0.5">
                    <span className="relative flex h-2.5 w-2.5">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                    </span>
                    <p className="text-xs font-medium text-slate-500 uppercase tracking-wider">Live Updates</p>
                  </div>
                </div>
              </div>

              <div className="flex items-center gap-3 w-full sm:w-auto">
                <div className="relative w-full sm:w-72">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <IconSearch />
                  </div>
                  <input
                    type="text"
                    className="block w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg leading-5 bg-slate-100 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 sm:text-sm"
                    placeholder="Search companies, roles..."
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
                <button onClick={loadData} className="p-2 text-slate-500 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 rounded-lg">
                  <IconRefresh className={isRefreshing ? "animate-spin text-blue-600" : ""} />
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4">
                <div className="bg-blue-50 p-3.5 rounded-xl text-blue-600"><IconCalendar /></div>
                <div>
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Layoffs This Month</p>
                  <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">{stats.monthTotal.toLocaleString()}</h2>
                  <p className="text-sm text-slate-500 mt-1 font-medium">Impacted employees</p>
                </div>
              </div>
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4">
                <div className="bg-amber-50 p-3.5 rounded-xl text-amber-600"><IconUsers /></div>
                <div>
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Layoffs This Year</p>
                  <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">{stats.yearTotal.toLocaleString()}</h2>
                  <p className="text-sm text-slate-500 mt-1 font-medium">Impacted employees</p>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
                <h3 className="text-lg font-bold text-slate-900">Recent Announcements</h3>
                <span className="bg-slate-100 text-slate-600 text-xs font-semibold px-2.5 py-1 rounded-full">{filteredData.length} records</span>
              </div>
              
              <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-slate-100">
                  <thead className="bg-slate-50/80">
                    <tr>
                      <th className="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase">Date</th>
                      <th className="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase">Company</th>
                      <th className="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase">Impacted</th>
                      <th className="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase">Roles Affected</th>
                      <th className="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase">Source</th>
                    </tr>
                  </thead>
                  <tbody className="bg-white divide-y divide-slate-100">
                    {filteredData.map((item) => (
                      <tr key={item.id || item.date + item.company} className="hover:bg-slate-50 group">
                        <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500">
                          {new Date(item.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
                        </td>
                        <td className="px-6 py-4 whitespace-nowrap"><div className="font-bold text-slate-900">{item.company}</div></td>
                        <td className="px-6 py-4 whitespace-nowrap">
                          {item.number ? (
                            <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-red-50 text-red-700 border border-red-100">
                              {item.number.toLocaleString()}
                            </span>
                          ) : <span className="text-sm text-slate-400 italic font-medium">Unknown</span>}
                        </td>
                        <td className="px-6 py-4 text-sm text-slate-600 max-w-xs truncate font-medium">{item.roles}</td>
                        <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                          <a href={item.link} target="_blank" className="text-blue-600 hover:text-blue-800 inline-flex items-center gap-1.5">
                            Article <IconExternalLink />
                          </a>
                        </td>
                      </tr>
                    ))}
                    {filteredData.length === 0 && (
                      <tr><td colSpan="5" className="px-6 py-16 text-center text-slate-500">No records to display yet. The bot is searching!</td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
